#cloud-config

package_update: true

packages:
  - ca-certificates
  - curl
  - git

write_files:
  - path: /usr/local/sbin/seal-bootstrap
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      # Install Docker Engine and Docker Compose.
      install -m 0755 -d /etc/apt/keyrings

      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
        -o /etc/apt/keyrings/docker.asc

      chmod a+r /etc/apt/keyrings/docker.asc

      source /etc/os-release

      cat > /etc/apt/sources.list.d/docker.sources <<EOF
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: ${UBUNTU_CODENAME:-$VERSION_CODENAME}
      Components: stable
      Architectures: $(dpkg --print-architecture)
      Signed-By: /etc/apt/keyrings/docker.asc
      EOF

      apt-get update

      apt-get install -y \
        docker-ce \
        docker-ce-cli \
        containerd.io \
        docker-buildx-plugin \
        docker-compose-plugin

      systemctl enable --now docker

      # Clone the desired state and agent source.
      rm -rf /opt/seal

      git clone \
        --branch main \
        --single-branch \
        https://github.com/viper6z/seal.git \
        /opt/seal

      # Build the agent using a temporary Go build container.
      docker run --rm \
        --mount type=bind,src=/opt/seal/agent,dst=/src \
        --workdir /src \
        --env CGO_ENABLED=0 \
        golang:1.26.5-alpine \
        go build -o /src/seal-agent .

      # Install the agent binary.
      install \
        -m 0755 \
        /opt/seal/agent/seal-agent \
        /usr/local/bin/seal-agent

      rm -f /opt/seal/agent/seal-agent

      # Install the systemd service and timer.
      install \
        -m 0644 \
        /opt/seal/agent/systemd/seal-agent.service \
        /etc/systemd/system/seal-agent.service

      install \
        -m 0644 \
        /opt/seal/agent/systemd/seal-agent.timer \
        /etc/systemd/system/seal-agent.timer

      systemctl daemon-reload
      systemctl enable --now seal-agent.timer

      # Perform the first reconciliation immediately instead of waiting
      # for the timer's first scheduled execution.
      systemctl start seal-agent.service

runcmd:
  - [bash, /usr/local/sbin/seal-bootstrap]
